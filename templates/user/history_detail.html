{% extends "user/base_user.html" %}

{% block title %}Детали сессии — ASR Сервис{% endblock %}

{% block user_content %}
<div class="container">
  <h1 style="margin:0 0 24px;">Детали сессии</h1>
  
  <div id="sessionDetail">
    <div class="skeleton" style="height:300px;"></div>
  </div>

  <div class="flex gap-2 mt-4">
    <a href="javascript:void(0)" class="btn btn-ghost" onclick="goBackToHistory()">← Назад</a>
  </div>
</div>

<script>
  const sessionId = '{{ session_id }}';

  async function loadSessionDetail() {
    const el = document.getElementById('sessionDetail');
    try {
      const resp = await Auth.apiFetch('/api/v1/user/sessions/' + sessionId);
      if (!resp.ok) throw new Error('Сессия не найдена');
      const s = await resp.json();

      const statusClass = s.status === 'completed' ? 'badge-success' : s.status === 'failed' ? 'badge-danger' : 'badge-warning';
      const resultJson = s.result_json ? JSON.stringify(s.result_json, null, 2) : 'Нет данных';

      el.innerHTML = `
        <div class="card mb-4">
          <div class="flex items-center justify-between" style="margin-bottom:16px;">
            <h3 style="margin:0;">${UI.formatDate(s.created_at)}</h3>
            <span class="badge ${statusClass}">${s.status}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">
            <div>
              <div class="text-muted text-xs">Тип</div>
              <div class="text-sm">${s.session_type}</div>
            </div>
            <div>
              <div class="text-muted text-xs">Длительность аудио</div>
              <div class="text-sm">${s.audio_duration_sec ? UI.formatDuration(s.audio_duration_sec) : '-'}</div>
            </div>
            <div>
              <div class="text-muted text-xs">IP</div>
              <div class="text-sm">${s.request_ip || '-'}</div>
            </div>
            <div>
              <div class="text-muted text-xs">Завершено</div>
              <div class="text-sm">${s.completed_at ? UI.formatDate(s.completed_at) : '-'}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="flex items-center justify-between" style="margin-bottom:12px;">
            <h3 style="margin:0;">Результат</h3>
            <div class="flex gap-2">
              <button class="btn btn-ghost btn-sm" id="btnDownloadJson" onclick="downloadJson()">Скачать JSON</button>
              <button class="btn btn-ghost btn-sm" id="btnDownloadTxt" onclick="downloadTxt()">Скачать TXT</button>
            </div>
          </div>
          <pre id="resultPre" style="background:var(--color-bg);padding:16px;border-radius:var(--radius);overflow:auto;max-height:500px;font-size:13px;">${highlightJson(resultJson)}</pre>
        </div>
      `;
      window._sessionData = s;
    } catch (e) {
      el.innerHTML = `<div class="text-muted">Не удалось загрузить детали <button class="btn btn-ghost btn-sm" onclick="loadSessionDetail()">Повторить</button></div>`;
      UI.toast(e.message, 'error');
    }
  }

  function highlightJson(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, function(match) {
        let cls = 'json-string';
        if (/:$/.test(match)) { cls = 'json-key'; match = match.slice(0, -1) + '</span>:'; return '<span class="' + cls + '">' + match; }
        return '<span class="' + cls + '">' + match + '</span>';
      })
      .replace(/\b(true|false|null)\b/g, '<span class="json-boolean">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="json-number">$1</span>');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function downloadJson() {
    if (!window._sessionData || !window._sessionData.result_json) return;
    const btn = document.getElementById('btnDownloadJson');
    UI.setLoading(btn, true);
    try {
      const blob = new Blob([JSON.stringify(window._sessionData.result_json, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'session_' + sessionId + '.json';
      a.click();
    } finally { UI.setLoading(btn, false); }
  }

  function downloadTxt() {
    if (!window._sessionData || !window._sessionData.result_json) return;
    const btn = document.getElementById('btnDownloadTxt');
    UI.setLoading(btn, true);
    try {
      const text = window._sessionData.result_json.sentenced_data?.raw_text_sentenced_recognition 
        || window._sessionData.result_json.raw_data?.channel_1?.map(x => x.data?.text).join('\n') 
        || JSON.stringify(window._sessionData.result_json, null, 2);
      const blob = new Blob([text], {type:'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'session_' + sessionId + '.txt';
      a.click();
    } finally { UI.setLoading(btn, false); }
  }

  function goBackToHistory() {
    if (history.length > 1) {
      history.back();
    } else {
      window.location.href = '/history';
    }
  }
</script>

<style>
  .json-key { color: #93c5fd; }
  .json-string { color: #86efac; }
  .json-number { color: #fca5a5; }
  .json-boolean { color: #f0abfc; }
</style>
<script>
  loadSessionDetail();
</script>
{% endblock %}
