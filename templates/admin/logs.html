{% extends "admin/base_admin.html" %}
{% block title %}Логи{% endblock %}
{% block content %}
<h1>Системные логи</h1>
<div class="card">
    <p>Загрузка логов...</p>
    <table id="logsTable" border="1" cellpadding="8" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr><th>Уровень</th><th>Компонент</th><th>Сообщение</th><th>Дата</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script>
    async function loadLogs() {
        const resp = await fetch('/api/v1/admin/logs');
        const data = await resp.json();
        const tbody = document.querySelector('#logsTable tbody');
        tbody.innerHTML = data.map(l => `
            <tr>
                <td>${l.level}</td>
                <td>${l.component}</td>
                <td>${l.message}</td>
                <td>${l.created_at || ''}</td>
            </tr>
        `).join('');
        document.querySelector('.card p').style.display = 'none';
    }
    loadLogs();
</script>
{% endblock %}
