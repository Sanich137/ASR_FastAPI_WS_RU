{% extends "admin/base_admin.html" %}
{% block title %}Подписки{% endblock %}
{% block content %}
<h1>Подписки</h1>
<div class="card">
    <p>Загрузка подписок...</p>
    <table id="subsTable" border="1" cellpadding="8" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr><th>ID</th><th>Пользователь</th><th>План</th><th>Статус</th><th>Действия</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script>
    async function loadSubs() {
        const resp = await fetch('/api/v1/admin/subscriptions');
        const data = await resp.json();
        const tbody = document.querySelector('#subsTable tbody');
        tbody.innerHTML = data.map(s => `
            <tr>
                <td>${s.id}</td>
                <td>${s.user_id}</td>
                <td>${s.plan_id}</td>
                <td>${s.status}</td>
                <td><button onclick="alert('Заглушка продления')">Продлить</button></td>
            </tr>
        `).join('');
        document.querySelector('.card p').style.display = 'none';
    }
    loadSubs();
</script>
{% endblock %}
