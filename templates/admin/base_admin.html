<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Админ-панель{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/design-system.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--color-bg); color: var(--color-text); }
    .admin-layout { display: flex; min-height: 100vh; }
    aside.sidebar {
      width: 220px; background: var(--color-surface); border-right: 1px solid var(--color-border);
      padding: 16px; display: flex; flex-direction: column; gap: 8px;
    }
    aside.sidebar a {
      display: block; padding: 8px 12px; border-radius: var(--radius); color: var(--color-muted);
      text-decoration: none; font-size: 14px;
    }
    aside.sidebar a:hover, aside.sidebar a.active { background: rgba(59,130,246,.1); color: var(--color-primary); }
    .sidebar-header { font-weight: 700; font-size: 16px; margin-bottom: 12px; color: var(--color-text); }
    main.admin-main { flex: 1; padding: 24px; overflow: auto; }
    .mobile-header {
      display: none; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--color-surface); border-bottom: 1px solid var(--color-border);
    }
    .hamburger { font-size: 20px; background: none; border: none; color: var(--color-text); cursor: pointer; }
    @media (max-width: 768px) {
      aside.sidebar { position: fixed; left: -220px; top: 0; bottom: 0; z-index: 200; transition: left .2s; }
      aside.sidebar.open { left: 0; }
      main.admin-main { padding: 16px; }
      .mobile-header { display: flex; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="mobile-header">
    <span style="font-weight:700;">ASR Admin</span>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  </div>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">ASR Admin</div>
      <nav>
        <a href="/admin/dashboard" class="{% if request.url.path == '/admin/dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/admin/users" class="{% if request.url.path == '/admin/users' %}active{% endif %}">Пользователи</a>
        <a href="/admin/sessions" class="{% if request.url.path == '/admin/sessions' %}active{% endif %}">Сессии</a>
        <a href="/admin/subscriptions" class="{% if request.url.path == '/admin/subscriptions' %}active{% endif %}">Подписки</a>
        <a href="/admin/transactions" class="{% if request.url.path == '/admin/transactions' %}active{% endif %}">Транзакции</a>
        <a href="/admin/tariffs" class="{% if request.url.path == '/admin/tariffs' %}active{% endif %}">Тарифы</a>
        <a href="/admin/api-keys" class="{% if request.url.path == '/admin/api-keys' %}active{% endif %}">API-ключи</a>
        <a href="/admin/logs" class="{% if request.url.path == '/admin/logs' %}active{% endif %}">Логи</a>
        <a href="/admin/settings" class="{% if request.url.path == '/admin/settings' %}active{% endif %}">Настройки</a>
        <a href="/admin/telegram" class="{% if request.url.path == '/admin/telegram' %}active{% endif %}">Telegram</a>
      </nav>
      <div style="margin-top:auto;">
        <button class="btn btn-ghost w-full" onclick="logout()">Выйти</button>
      </div>
    </aside>
    <main class="admin-main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/admin_ui.js"></script>
  <script>
    async function logout() {
      try { await fetch('/api/v1/auth/logout', {method:'POST', credentials:'include'}); } catch(e) {}
      Auth.clearAuth();
      window.location.href = '/login';
    }
    AdminUI.initAdmin();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
