{% extends "admin/base_admin.html" %}
{% block title %}Telegram{% endblock %}
{% block content %}
<h1>Telegram-интеграция</h1>
<div class="card">
    <p>Загрузка конфигурации...</p>
    <div id="tgConfig"></div>
</div>
<script>
    async function loadConfig() {
        const resp = await fetch('/api/v1/admin/telegram/config');
        const data = await resp.json();
        document.getElementById('tgConfig').innerHTML = `
            <p>WebApp URL: ${data.webapp_url || 'не задан'}</p>
            <p>Активен: ${data.is_active ? 'Да' : 'Нет'}</p>
        `;
        document.querySelector('.card p').style.display = 'none';
    }
    loadConfig();
</script>
{% endblock %}
